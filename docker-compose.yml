services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"  # docker rmi padelhub-backend --force
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: sh -c "sleep 8 && npx prisma migrate deploy && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: duocucpadelhub
      POSTGRES_DB: padelhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: